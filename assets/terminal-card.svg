<?xml version="1.0" encoding="UTF-8"?>
<svg width="920" height="260" viewBox="0 0 920 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Filtro de brilho (glow) com intensidade animada -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur result="blur">
        <animate attributeName="stdDeviation" values="2;5;2" dur="2.5s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo do card -->
  <rect x="0" y="0" width="920" height="260" rx="10" fill="#0d0221" />

  <!-- Grade sutil de fundo (efeito HUD) -->
  <g stroke="#1a1240" stroke-width="1" opacity="0.5">
    <line x1="0" y1="65" x2="920" y2="65" />
    <line x1="0" y1="130" x2="920" y2="130" />
    <line x1="0" y1="195" x2="920" y2="195" />
  </g>

  <!-- Borda neon com cor e brilho animados -->
  <rect x="10" y="10" width="900" height="240" rx="8" fill="none" stroke="#FF2E9A" stroke-width="2" filter="url(#neonGlow)">
    <animate attributeName="stroke" values="#FF2E9A;#5CE1E6;#FF2E9A" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Cantos estilo mira/HUD -->
  <g stroke="#5CE1E6" stroke-width="3" fill="none">
    <path d="M 4 30 L 4 4 L 30 4" />
    <path d="M 890 4 L 916 4 L 916 30" />
    <path d="M 916 230 L 916 256 L 890 256" />
    <path d="M 30 256 L 4 256 L 4 230" />
  </g>

  <!-- Linha de scan descendo continuamente -->
  <rect x="10" y="10" width="900" height="3" fill="#5CE1E6" opacity="0.35">
    <animate attributeName="y" values="10;244;10" dur="3s" repeatCount="indefinite" />
  </rect>

  <!-- Texto do terminal -->
  <text x="50" y="72" font-family="Fira Code, Consolas, monospace" font-size="18" fill="#5CE1E6">USER:
    <tspan fill="#ffffff">Caroline Martini</tspan>
  </text>

  <text x="50" y="112" font-family="Fira Code, Consolas, monospace" font-size="18" fill="#5CE1E6">CLASS:
    <tspan fill="#ffffff">Full-Stack Developer // Frontend Spec.</tspan>
  </text>

  <text x="50" y="152" font-family="Fira Code, Consolas, monospace" font-size="18" fill="#5CE1E6">LOCATION:
    <tspan fill="#ffffff">Relvado, Rio Grande do Sul, BR</tspan>
  </text>

  <text x="50" y="192" font-family="Fira Code, Consolas, monospace" font-size="18" fill="#5CE1E6">MISSION:
    <tspan fill="#ffffff">Investindo em qualificacoes tecnicas</tspan>
  </text>

</svg>
